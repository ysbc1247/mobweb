{% extends 'blog/base.html' %}

{% block content %}
    {% for post in posts %}
        <div class="post">
            <div class="date">
                <p>published: {{ post.published_date }}</p>
            </div>
            <h1><a href="{% url 'post_detail' pk=post.pk %}">{{ post.title }}</a></h1>
            <p>{{ post.text|linebreaksbr }}</p>
        </div>
    {% empty %}
        <div class="post">
            <h1>No posts yet</h1>
            <p>Add a post from the Django admin page.</p>
        </div>
    {% endfor %}
{% endblock %}
