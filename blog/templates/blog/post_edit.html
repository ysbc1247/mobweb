{% extends 'blog/base.html' %}

{% block content %}
    <h1>{{ form_title|default:"New post" }}</h1>
    <form method="POST" class="post-form" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="save btn btn-default">{{ submit_label|default:"Save" }}</button>
    </form>
{% endblock %}
