<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Chapter 19 JavaScript Fixed Game</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            background: #111827;
            color: #f9fafb;
            text-align: center;
        }

        h1 {
            margin: 18px 0 6px;
        }

        p {
            margin: 6px 0 14px;
            color: #d1d5db;
        }

        canvas {
            background: #f8fafc;
            border: 6px solid #38bdf8;
            border-radius: 10px;
        }

        .panel {
            margin: 12px auto 0;
            width: 640px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        button {
            margin-top: 12px;
            padding: 8px 18px;
            border: 0;
            border-radius: 6px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Chapter 19 JavaScript Game</h1>
    <p>방향키 또는 WASD로 파란 플레이어를 움직여 노란 별을 잡으세요.</p>
    <canvas id="gameCanvas" width="640" height="420"></canvas>
    <div class="panel">
        <span id="scoreText">Score: 0</span>
        <span id="timeText">Time: 30</span>
        <span id="stateText">Playing</span>
    </div>
    <button id="restartButton" type="button">Restart</button>

    <script>
        /*
         * Fixed bugs from the given game code pattern:
         * 1. Canvas context is read after the canvas element exists.
         * 2. Keyboard state uses consistent key names and removeEventListener is not needed.
         * 3. Collision uses rectangle distance correctly instead of assignment in condition.
         * 4. requestAnimationFrame receives the function reference, not the result of a call.
         * 5. Score/time DOM elements are updated through textContent with valid element ids.
         */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('scoreText');
        const timeText = document.getElementById('timeText');
        const stateText = document.getElementById('stateText');
        const restartButton = document.getElementById('restartButton');

        const keys = {};
        const player = { x: 40, y: 40, size: 36, speed: 4 };
        const star = { x: 420, y: 230, size: 30 };
        let score = 0;
        let timeLeft = 30;
        let gameOver = false;
        let lastTick = performance.now();
        const params = new URLSearchParams(window.location.search);
        const captureMode = params.get('capture') === '1';

        function resetGame() {
            player.x = 40;
            player.y = 40;
            star.x = 420;
            star.y = 230;
            score = 0;
            timeLeft = 30;
            gameOver = false;
            lastTick = performance.now();
            stateText.textContent = 'Playing';
            applyCaptureState();
            updateLabels();
        }

        function applyCaptureState() {
            if (!captureMode) return;

            player.x = Number(params.get('px') || player.x);
            player.y = Number(params.get('py') || player.y);
            star.x = Number(params.get('sx') || star.x);
            star.y = Number(params.get('sy') || star.y);
            score = Number(params.get('score') || score);
            timeLeft = Number(params.get('time') || timeLeft);
            gameOver = params.get('over') === '1';
            stateText.textContent = gameOver ? 'Finished' : 'Playing';
        }

        function updateLabels() {
            scoreText.textContent = `Score: ${score}`;
            timeText.textContent = `Time: ${Math.ceil(timeLeft)}`;
        }

        function movePlayer() {
            if (keys.ArrowLeft || keys.a) player.x -= player.speed;
            if (keys.ArrowRight || keys.d) player.x += player.speed;
            if (keys.ArrowUp || keys.w) player.y -= player.speed;
            if (keys.ArrowDown || keys.s) player.y += player.speed;

            player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));
        }

        function isColliding(a, b) {
            return (
                a.x < b.x + b.size &&
                a.x + a.size > b.x &&
                a.y < b.y + b.size &&
                a.y + a.size > b.y
            );
        }

        function placeStar() {
            star.x = Math.floor(Math.random() * (canvas.width - star.size));
            star.y = Math.floor(Math.random() * (canvas.height - star.size));
        }

        function drawStar(x, y, size) {
            const spikes = 5;
            const outerRadius = size / 2;
            const innerRadius = outerRadius / 2;
            let rotation = Math.PI / 2 * 3;
            const cx = x + outerRadius;
            const cy = y + outerRadius;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i += 1) {
                ctx.lineTo(cx + Math.cos(rotation) * outerRadius, cy + Math.sin(rotation) * outerRadius);
                rotation += Math.PI / spikes;
                ctx.lineTo(cx + Math.cos(rotation) * innerRadius, cy + Math.sin(rotation) * innerRadius);
                rotation += Math.PI / spikes;
            }
            ctx.closePath();
            ctx.fillStyle = '#facc15';
            ctx.fill();
            ctx.strokeStyle = '#ca8a04';
            ctx.stroke();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#e0f2fe';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawStar(star.x, star.y, star.size);

            ctx.fillStyle = '#2563eb';
            ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.strokeStyle = '#1e3a8a';
            ctx.lineWidth = 3;
            ctx.strokeRect(player.x, player.y, player.size, player.size);

            if (gameOver) {
                ctx.fillStyle = 'rgba(15, 23, 42, 0.75)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffffff';
                ctx.font = '42px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 10);
                ctx.font = '24px Arial';
                ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        function update(now) {
            const delta = (now - lastTick) / 1000;
            lastTick = now;

            if (captureMode) {
                updateLabels();
                draw();
                return;
            }

            if (!gameOver) {
                timeLeft -= delta;
                movePlayer();

                if (isColliding(player, star)) {
                    score += 1;
                    placeStar();
                }

                if (timeLeft <= 0) {
                    timeLeft = 0;
                    gameOver = true;
                    stateText.textContent = 'Finished';
                }

                updateLabels();
            }

            draw();
            requestAnimationFrame(update);
        }

        window.addEventListener('keydown', (event) => {
            keys[event.key] = true;
        });

        window.addEventListener('keyup', (event) => {
            keys[event.key] = false;
        });

        restartButton.addEventListener('click', resetGame);

        resetGame();
        requestAnimationFrame(update);
    </script>
</body>
</html>
